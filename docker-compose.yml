version: "3.9"

services:

  syllabsync:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: syllabsync-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL}
      - STUDENT_EMAIL=${STUDENT_EMAIL}
      - REVIEWER_EMAIL=${REVIEWER_EMAIL}
      - MAX_FILE_SIZE_MB=50
      - MAX_FILES=20
      - LOG_LEVEL=INFO
      - ALLOWED_ORIGINS=*
    volumes:
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  uploads:
